<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster App</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Home View -->
        <section id="home-view" class="view active">
            <div class="card">
                <div class="user-details-section">
                    <div class="logo">
                        <i class="fa-solid fa-brain"></i> QuizMaster
                    </div>
                    <h1 class="welcome-note">Welcome to the Ultimate Challenge!</h1>
                    <p class="subtitle">Enter your name to begin.</p>
                    <div class="input-group">
                        <input type="text" id="username-input" placeholder="Your Name" autocomplete="off">
                        <button id="enter-btn" class="btn primary-btn">Enter <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                    <p id="name-error" class="error-msg"></p>
                </div>

                <div id="category-section" class="category-section hidden">
                    <h2>Select Category</h2>
                    <div class="category-grid">
                        <button class="category-btn" data-category="mongodb">MongoDB</button>
                        <button class="category-btn" data-category="express">Express.js</button>
                        <button class="category-btn" data-category="react">React</button>
                        <button class="category-btn" data-category="nodejs">Node.js</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quiz View -->
        <section id="quiz-view" class="view hidden">
            <div class="quiz-header">
                <div class="timer-container">
                    <i class="fa-regular fa-clock"></i> <span id="timer-display">10s</span>
                </div>
                <div class="category-title" id="quiz-category-title">Category Name</div>
                <div class="score-container">
                    Score: <span id="current-score">0</span>
                </div>
            </div>

            <div class="card quiz-card">
                <div class="question-header">
                    <span id="question-number">Question 1 of 10</span>
                </div>
                <h2 id="question-text">Question text goes here?</h2>
                
                <div class="options-grid" id="options-container">
                    <!-- Options injected via JS -->
                </div>

                <div class="quiz-footer">
                    <button id="next-btn" class="btn primary-btn disabled" disabled>Next Question <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </section>

        <!-- Result View -->
        <section id="result-view" class="view hidden">
            <div class="card result-card">
                <div class="result-header">
                    <h2>Quiz Completed!</h2>
                    <p class="participant-name">Well done, <span id="result-name">User</span></p>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <i class="fa-solid fa-stopwatch"></i>
                        <span class="stat-value" id="result-time">0s</span>
                        <span class="stat-label">Total Time</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-list-ol"></i>
                        <span class="stat-value" id="result-total-q">10</span>
                        <span class="stat-label">Total Questions</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-hand-pointer"></i>
                        <span class="stat-value" id="result-attempted">0</span>
                        <span class="stat-label">Attempted</span>
                    </div>
                    <div class="stat-box correct">
                        <i class="fa-solid fa-check"></i>
                        <span class="stat-value" id="result-correct">0</span>
                        <span class="stat-label">Correct</span>
                    </div>
                    <div class="stat-box wrong">
                        <i class="fa-solid fa-xmark"></i>
                        <span class="stat-value" id="result-wrong">0</span>
                        <span class="stat-label">Wrong</span>
                    </div>
                    <div class="stat-box score-percent">
                        <i class="fa-solid fa-percent"></i>
                        <span class="stat-value" id="result-percent">0%</span>
                        <span class="stat-label">Score</span>
                    </div>
                </div>

                <div class="result-actions">
                    <button id="start-again-btn" class="btn primary-btn">Start Again</button>
                    <button id="home-btn" class="btn secondary-btn">Go to Home</button>
                </div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
